<!DOCTYPE html>
<html>

<head>
    <title>Registration Form</title>

    <script>
        function validateForm(event) {

            let fname = document.forms["regForm"]["fname"].value.trim();
            let lname = document.forms["regForm"]["lname"].value.trim();
            let address = document.forms["regForm"]["address"].value.trim();
            let country = document.forms["regForm"]["country"].value;
            let gender = document.querySelector('input[name="gender"]:checked');
            let skills = document.querySelectorAll('input[name="skills[]"]:checked');
            let username = document.forms["regForm"]["username"].value.trim();
            let password = document.forms["regForm"]["password"].value.trim();
            let code = document.forms["regForm"]["code"].value.trim();

            let namePattern = /^[A-Za-z]+$/;

            if (fname === "" || !namePattern.test(fname)) {
                alert("Invalid First Name");
                event.preventDefault();
                return;
            }

            if (lname === "" || !namePattern.test(lname)) {
                alert("Invalid Last Name");
                event.preventDefault();
                return;
            }

            if (address === "") {
                alert("Address required");
                event.preventDefault();
                return;
            }

            if (country === "Select Country") {
                alert("Select country");
                event.preventDefault();
                return;
            }

            if (!gender) {
                alert("Select gender");
                event.preventDefault();
                return;
            }

            if (skills.length === 0) {
                alert("Select at least one skill");
                event.preventDefault();
                return;
            }

            if (username.length < 4) {
                alert("Username too short");
                event.preventDefault();
                return;
            }

            if (password.length < 6) {
                alert("Password too short");
                event.preventDefault();
                return;
            }

            if (code !== "Sh68Sa") {
                alert("Invalid code");
                event.preventDefault();
                return;
            }
        }
    </script>
</head>

<body>

    <h2>Registration</h2>

    <form name="regForm" action="done.php" method="get" onsubmit="validateForm(event)">

        First Name:<br>
        <input type="text" name="fname"><br><br>

        Last Name:<br>
        <input type="text" name="lname"><br><br>

        Address:<br>
        <textarea name="address" rows="4" cols="40"></textarea><br><br>

        Country:<br>
        <select name="country">
            <option>Select Country</option>
            <option>Egypt</option>
            <option>USA</option>
            <option>UK</option>
        </select><br><br>

        Gender:<br>
        <input type="radio" name="gender" value="Male"> Male
        <input type="radio" name="gender" value="Female"> Female
        <br><br>

        Skills:<br>
        <input type="checkbox" name="skills[]" value="PHP"> PHP
        <input type="checkbox" name="skills[]" value="MySQL"> MySQL
        <input type="checkbox" name="skills[]" value="J2SE"> J2SE
        <input type="checkbox" name="skills[]" value="PostgreSQL"> PostgreSQL
        <br><br>

        Username:<br>
        <input type="text" name="username"><br><br>

        Password:<br>
        <input type="password" name="password"><br><br>

        Department:<br>
        <input type="text" name="department" value="OpenSource" readonly><br><br>

        Code: Sh68Sa<br>
        <input type="text" name="code"><br><br>

        <input type="submit" value="Submit">
        <input type="reset" value="Reset">

    </form>

</body>

</html>
